options:
  logging: CLOUD_LOGGING_ONLY
  env:
    - 'TF_VAR_project_id=${_PROJECT_ID}'

steps:
  # Initialize Terraform
  - name: 'hashicorp/terraform:1.5.7'
    args: ['init']
    dir: 'terraform'

  # Destroy the infrastructure
  - name: 'hashicorp/terraform:1.5.7'
    args: 
      - 'destroy'
      - '-auto-approve'
      - '-var=project_id=$PROJECT_ID'
    dir: 'terraform'

options:
  logging: CLOUD_LOGGING_ONLY
