options:
  logging: CLOUD_LOGGING_ONLY
  env:
    - 'TF_VAR_project_id=${_PROJECT_ID}'
    - 'TF_VAR_region=${_REGION}'
    - 'TF_VAR_github_app_installation_id=${_GITHUB_APP_INSTALLATION_ID}'

steps:
- id: 'branch name'
  name: 'alpine'
  entrypoint: 'sh'  
  args: 
  - '-c'
  - | 
      echo "***********************"
      echo "$BRANCH_NAME"
      echo "***********************"

- id: 'tf init'
  name: 'hashicorp/terraform:1.5.7'
  entrypoint: 'sh'
  secretEnv: ['GITHUB_PAT']
  args: 
  - '-c'
  - |
      export TF_VAR_github_pat=$$GITHUB_PAT
      if [ -d "tf-test" ]; then
        cd tf-test
        terraform init
      else
          echo "*************** TERRAFORM INIT ******************"
          echo "******* terraform folder not found ********"
          echo "*************************************************"
          exit 1
      fi 

# [START tf-plan]
- id: 'tf plan'
  name: 'hashicorp/terraform:1.5.7'
  entrypoint: 'sh'
  secretEnv: ['GITHUB_PAT']
  args: 
  - '-c'
  - | 
      export TF_VAR_github_pat=$$GITHUB_PAT
      if [ -d "tf-test" ]; then
        cd tf-test
        terraform plan
      else
          echo "*************** TERRAFORM INIT ******************"
          echo "******* terraform folder not found ********"
          echo "*************************************************"
          exit 1
      fi 
# [END tf-plan]
# [START tf-apply]
- id: 'tf apply'
  name: 'hashicorp/terraform:1.5.7'
  entrypoint: 'sh'
  secretEnv: ['GITHUB_PAT']
  args: 
  - '-c'
  - | 
      export TF_VAR_github_pat=$$GITHUB_PAT
      if [ "$BRANCH_NAME" == "main" ]; then
        if [ -d "tf-test" ]; then
          cd tf-test
          terraform plan #apply -auto-approve
        else
          echo "******* tf-test folder not found ********"
          exit 1
        fi
      else
        echo "***************************** SKIPPING APPLYING *******************************"
        echo "Branch '$BRANCH_NAME' does not represent for applying terraform resources."
        echo "*******************************************************************************"
      fi
# [END tf-apply]

available_secrets:
  secret_manager:
  - versionName: projects/$PROJECT_ID/secrets/github-token/versions/latest
    env: 'GITHUB_PAT'
