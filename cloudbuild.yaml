steps:
- id: 'branch name'
  name: 'alpine'
  entrypoint: 'sh'  
  args: 
  - '-c'
  - | 
      echo "***********************"
      echo "$BRANCH_NAME"
      echo "***********************"

- id: 'tf init'
  name: 'hashicorp/terraform:1.3.9'
  entrypoint: 'sh'
  args: 
  - '-c'
  - |
      if [ -d "terraform" ]; then
        cd terraform
        terraform init
      else
          echo "*************** TERRAFORM INIT ******************"
          echo "******* terraform folder not found ********"
          echo "*************************************************"
          exit 1
      fi 

# [START tf-plan]
- id: 'tf plan'
  name: 'hashicorp/terraform:1.3.9'
  entrypoint: 'sh'
  args: 
  - '-c'
  - | 
      if [ -d "terraform" ]; then
        cd terraform
        terraform plan
      else
          echo "*************** TERRAFORM INIT ******************"
          echo "******* terraform folder not found ********"
          echo "*************************************************"
          exit 1
      fi 
# [END tf-plan]


